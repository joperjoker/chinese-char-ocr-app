name: chinese_char_ocr_app
description: A Flutter app for Chinese character OCR recognition with Pinyin verification.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # OCR text recognition via Google ML Kit.
  # This plugin bundles ONLY the Latin recogniser; the Chinese model is added
  # as a direct `implementation` dependency in android/app/build.gradle (the
  # plugin declares it `compileOnly`, so it is otherwise absent from the APK).
  # 0.15.x pins text-recognition 16.0.1, whose native libraries are 16KB-page
  # aligned — required on Android 15/16, where older libs crash natively.
  google_mlkit_text_recognition: ^0.15.1

  # Camera access for live capture
  camera: ^0.12.0

  # Chinese character to Pinyin conversion
  lpinyin: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/dict/cedictJSON.json
    - assets/dict/chinese_defs.json
    - assets/radicals/decomp.json
