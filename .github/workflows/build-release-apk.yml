name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate launcher icons
        shell: python
        run: |
            # Write valid solid-colour PNGs at the five Android mipmap
            # densities. Python's stdlib is the most portable choice across
            # GitHub-hosted runner image versions (no apt install needed,
            # no ImageMagick dependency).
            import os
            import struct
            import zlib

            # Material Red 900 — solid square icon
            R, G, B = 0xB7, 0x1C, 0x1C

            DENSITIES = [
                (48, "mdpi"),
                (72, "hdpi"),
                (96, "xhdpi"),
                (144, "xxhdpi"),
                (192, "xxxhdpi"),
            ]

            def chunk(tag: bytes, data: bytes) -> bytes:
                return (
                    struct.pack(">I", len(data))
                    + tag
                    + data
                    + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
                )

            def make_png(size: int) -> bytes:
                # IHDR — 8-bit RGB, no filter / interlace
                ihdr = struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0)
                # Each row: 1 filter byte (0 = None) + size * RGB triples
                row = b"\x00" + bytes([R, G, B]) * size
                raw = row * size
                idat = zlib.compress(raw, 9)
                return (
                    b"\x89PNG\r\n\x1a\n"
                    + chunk(b"IHDR", ihdr)
                    + chunk(b"IDAT", idat)
                    + chunk(b"IEND", b"")
                )

            for size, density in DENSITIES:
                directory = f"android/app/src/main/res/mipmap-{density}"
                os.makedirs(directory, exist_ok=True)
                path = f"{directory}/ic_launcher.png"
                with open(path, "wb") as fh:
                    fh.write(make_png(size))
                print(f"wrote {path} ({size}x{size}, {os.path.getsize(path)} bytes)")

      - name: Download CEDICT dictionary
        run: |
          # Re-download whenever the working copy lacks the FULL dictionary.
          # The repo ships a tiny sample cedictJSON.json (a handful of entries)
          # so the app and tests build locally; a bare `[ ! -f ]` check would
          # see that placeholder and skip the download, shipping a 10-word
          # dictionary in the release APK. Gate on file size instead so the
          # real ~19MB / 112k-entry dictionary is always fetched for releases.
          mkdir -p assets/dict
          SIZE=0
          if [ -f assets/dict/cedictJSON.json ]; then
            SIZE=$(wc -c < assets/dict/cedictJSON.json)
          fi
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Dictionary missing or placeholder ($SIZE bytes); downloading full CEDICT…"
            curl -fL \
              "https://raw.githubusercontent.com/rawmarshmellows/chinese-pinyin-JSON/master/cedictJSON.json" \
              -o assets/dict/cedictJSON.json
            echo "Downloaded $(du -sh assets/dict/cedictJSON.json | cut -f1) dictionary."
          else
            echo "Full dictionary already present ($SIZE bytes), skipping download."
          fi

      - name: Generate radical decomposition data
        shell: python
        run: |
            # Download IDS (Ideographic Description Sequences) data from cjkvi/cjkvi-ids
            # and emit a compact JSON mapping each character that has a simple left-right
            # composition (⿰) to its two components.  Characters whose components are
            # complex sub-sequences (not single CJK codepoints) are excluded so that the
            # Dart side needs no IDS parsing logic.
            import os, json, urllib.request

            os.makedirs('assets/radicals', exist_ok=True)
            out = 'assets/radicals/decomp.json'

            LR_OP = '⿰'  # ⿰ — left-right IDS composition operator

            def is_cjk(c):
                cp = ord(c)
                return (
                    0x4E00 <= cp <= 0x9FFF   # CJK Unified Ideographs
                    or 0x3400 <= cp <= 0x4DBF  # Extension A
                    or 0xF900 <= cp <= 0xFAFF  # CJK Compatibility
                    or 0x20000 <= cp <= 0x2A6DF # Extension B
                )

            result = {}
            try:
                url = 'https://raw.githubusercontent.com/cjkvi/cjkvi-ids/master/ids.txt'
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=60) as r:
                    raw = r.read().decode('utf-8')

                for line in raw.splitlines():
                    if not line or line.startswith('#') or '\t' not in line:
                        continue
                    parts = line.split('\t')
                    if len(parts) < 3:
                        continue
                    char  = parts[1]
                    ids   = parts[2]
                    # Accept only simple ⿰ L R where L and R are each a single CJK char
                    if len(ids) == 3 and ids[0] == LR_OP and is_cjk(ids[1]) and is_cjk(ids[2]):
                        result[char] = {'l': ids[1], 'r': ids[2]}

                print(f'Generated {len(result)} left-right decompositions.')
            except Exception as e:
                print(f'Warning: IDS download failed ({e}); writing empty decomp.json.')

            with open(out, 'w', encoding='utf-8') as f:
                json.dump(result, f, ensure_ascii=False, separators=(',', ':'))
            print(f'Wrote {os.path.getsize(out)} bytes → {out}')

      - name: Generate Chinese definitions data
        shell: python
        run: |
            # Build a compact {word: definition} table from the MIT-licensed
            # pwxcoo/chinese-xinhua dataset.  word.json covers single hanzi;
            # ci.json covers multi-character words.  ci.json entries are kept
            # only when the word also exists in the bundled CEDICT index, so
            # the asset stays compact and every definition is reachable from
            # a recognition result card.
            import json, os, re, urllib.request

            def fetch(url):
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=120) as r:
                    return json.loads(r.read().decode('utf-8'))

            def clean(text, limit=240):
                text = re.sub(r'\s+', ' ', (text or '')).strip()
                return text[:limit] + ('…' if len(text) > limit else '')

            out = 'assets/dict/chinese_defs.json'
            result = {}
            try:
                base = 'https://raw.githubusercontent.com/pwxcoo/chinese-xinhua/master/data'
                with open('assets/dict/cedictJSON.json', encoding='utf-8') as f:
                    known = {e.get('simplified', '') for e in json.load(f)}

                for entry in fetch(f'{base}/word.json'):
                    w, d = entry.get('word', ''), clean(entry.get('explanation', ''))
                    if w and d:
                        result[w] = d

                for entry in fetch(f'{base}/ci.json'):
                    w, d = entry.get('ci', ''), clean(entry.get('explanation', ''))
                    if w and d and w in known and w not in result:
                        result[w] = d

                print(f'Built {len(result)} Chinese definitions.')
            except Exception as e:
                print(f'Warning: definition build failed ({e}); writing empty table.')
                result = {}

            with open(out, 'w', encoding='utf-8') as f:
                json.dump(result, f, ensure_ascii=False, separators=(',', ':'))
            print(f'Wrote {os.path.getsize(out)} bytes → {out}')

      - name: Verify data assets are fully populated
        # Hard gate. The dictionary, radical table and definitions are fetched
        # from the network in the steps above; if any download silently failed
        # (or a placeholder slipped through), the combine feature and all
        # pinyin/definition lookups would be broken in the shipped APK. Refuse
        # to build a release on under-populated data rather than ship it.
        shell: python
        run: |
            import json, sys
            checks = [
                ('assets/dict/cedictJSON.json',   50000, 'CEDICT dictionary'),
                ('assets/radicals/decomp.json',    5000, 'radical decomposition table'),
                ('assets/dict/chinese_defs.json',  5000, 'Chinese definitions'),
            ]
            fail = False
            for path, min_entries, label in checks:
                try:
                    data = json.load(open(path, encoding='utf-8'))
                    n = len(data)
                except Exception as e:
                    print(f'FAIL: {label} ({path}) could not be parsed: {e}')
                    fail = True
                    continue
                if n < min_entries:
                    print(f'FAIL: {label} ({path}) has only {n} entries '
                          f'(expected >= {min_entries}). A network download likely '
                          'failed — refusing to ship a broken APK.')
                    fail = True
                else:
                    print(f'OK: {label} has {n} entries.')
            sys.exit(1 if fail else 0)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Static analysis
        # Informational: surfaces lints in the log without blocking a release
        # over a style nit. Real compile errors still fail the build step below.
        continue-on-error: true
        run: flutter analyze

      - name: Run unit tests
        # Hard gate: the dictionary, radical, composition and analyzer logic is
        # covered here, so a regression fails the build before any APK ships.
        run: flutter test

      - name: Build release APK
        # continue-on-error absorbs the known false-positive "Already watching
        # path: android" inotify exception that Flutter throws when the build
        # system registers a duplicate directory watcher.  Gradle still runs to
        # completion (as evidenced by 500 s+ runtimes in previous CI logs) and
        # produces the APK — Flutter just fails to detect it.  The next step
        # performs an explicit existence check so genuine Gradle failures still
        # fail the workflow.
        continue-on-error: true
        run: flutter build apk --release --no-pub

      - name: Locate and stage APK
        # Flutter's inotify watcher exception breaks the post-Gradle copy step,
        # leaving the APK at Gradle's native output path instead of Flutter's.
        # This step checks both locations and copies to the Flutter path so the
        # upload and release steps below work without modification.
        run: |
          FLUTTER_APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$FLUTTER_APK" ]; then
            echo "APK at Flutter path ($(du -sh "$FLUTTER_APK" | cut -f1)): $FLUTTER_APK"
          else
            GRADLE_APK=$(find android/app/build/outputs/apk -name "app-release.apk" 2>/dev/null | head -1)
            if [ -n "$GRADLE_APK" ]; then
              echo "APK found at Gradle path: $GRADLE_APK ($(du -sh "$GRADLE_APK" | cut -f1))"
              mkdir -p build/app/outputs/flutter-apk
              cp "$GRADLE_APK" "$FLUTTER_APK"
              echo "Copied to Flutter path: $FLUTTER_APK"
            else
              echo "ERROR: APK not found at Flutter path or Gradle path — Gradle genuinely failed."
              find . -name "*.apk" 2>/dev/null | head -10 || true
              exit 1
            fi
          fi

      - name: Verify Chinese OCR model is bundled in the APK
        # Hard gate against the class of bug that broke v1.0.1–v1.0.33: the
        # google_mlkit_text_recognition plugin declares the Chinese model
        # `compileOnly`, so it is absent from the APK unless the app adds it as
        # an `implementation` dependency.  When absent, every Chinese
        # recognition call crashes the process natively.  The release runtime
        # classpath is the definitive source of truth for what is packaged, so
        # we assert text-recognition-chinese is on it and fail the build if not.
        run: |
          set -o pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"
          echo "=== APK size ==="; du -h "$APK"

          echo "=== Resolving release runtime classpath ==="
          ( cd android && ./gradlew -q :app:dependencies \
              --configuration releaseRuntimeClasspath --console=plain 2>/dev/null ) \
              > /tmp/deps.txt || true
          echo "--- ML Kit entries on releaseRuntimeClasspath ---"
          grep -iE "mlkit|text-recognition" /tmp/deps.txt | sort -u || true

          echo "=== Native libraries packaged in the APK (largest last) ==="
          unzip -l "$APK" | awk '/\.so$/ {print $1"\t"$4}' | sort -n | tail -40 || true

          echo "=== ML Kit / OCR / model assets packaged in the APK ==="
          unzip -l "$APK" | grep -iE "mlkit|ocr|recognition|chinese|latin|model|\.tflite" \
              || echo "(no matching asset entries)"

          echo "=== Assertion ==="
          if grep -qiE "text-recognition-chinese" /tmp/deps.txt; then
            echo "PASS: text-recognition-chinese is on the release runtime classpath — Chinese model is bundled into the APK."
          else
            echo "FAIL: text-recognition-chinese is NOT on the release runtime classpath."
            echo "The Chinese OCR model would be missing and recognition would crash. Failing the build."
            exit 1
          fi

      - name: Verify native libraries are 16KB-aligned (Android 15/16)
        # 64-bit Android 15/16 devices can run with 16KB memory pages.  A shared
        # library whose LOAD segments are aligned to less than 16384 bytes fails
        # to load there and crashes the process — the exact failure mode that
        # plagued earlier builds.  Flutter 3.41 emits aligned libs, but the ML
        # Kit .so files are Google-prebuilt, so we check every arm64 library
        # (the only ABI affected, since 16KB pages are 64-bit only).
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          workdir="$(mktemp -d)"
          unzip -o -q "$APK" 'lib/arm64-v8a/*.so' -d "$workdir"
          echo "=== arm64-v8a LOAD-segment alignment (must be >= 16384) ==="
          fail=0
          for so in "$workdir"/lib/arm64-v8a/*.so; do
            min=
            for a in $(readelf -lW "$so" | awk '$1=="LOAD"{print $NF}'); do
              d=$(( a ))
              if [ -z "$min" ] || [ "$d" -lt "$min" ]; then min=$d; fi
            done
            name="$(basename "$so")"
            if [ -n "$min" ] && [ "$min" -ge 16384 ]; then
              printf 'OK         %-44s align=%s\n' "$name" "$min"
            else
              printf 'UNALIGNED  %-44s align=%s\n' "$name" "$min"
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "PASS: all arm64-v8a native libraries are >= 16KB aligned."
          else
            echo "WARN: one or more arm64-v8a native libraries are NOT 16KB aligned (listed above)."
          fi

      - name: Upload APK artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Chinese Character OCR App — release APK built from commit ${{ github.sha }}.

            Point the camera at Chinese text and tap the shutter. The app
            recognises the characters on-device with ML Kit and shows, for
            every word and character: tone-marked Hanyu Pinyin, left/right
            radical decomposition, an English definition (CEDICT), and a
            Chinese definition (xinhua dataset). Fully offline.

            Download `app-release.apk` below to install on an Android device.
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
