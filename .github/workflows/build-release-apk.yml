name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate launcher icons
        shell: python
        run: |
            # Write valid solid-colour PNGs at the five Android mipmap
            # densities. Python's stdlib is the most portable choice across
            # GitHub-hosted runner image versions (no apt install needed,
            # no ImageMagick dependency).
            import os
            import struct
            import zlib

            # Material Red 900 — solid square icon
            R, G, B = 0xB7, 0x1C, 0x1C

            DENSITIES = [
                (48, "mdpi"),
                (72, "hdpi"),
                (96, "xhdpi"),
                (144, "xxhdpi"),
                (192, "xxxhdpi"),
            ]

            def chunk(tag: bytes, data: bytes) -> bytes:
                return (
                    struct.pack(">I", len(data))
                    + tag
                    + data
                    + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
                )

            def make_png(size: int) -> bytes:
                # IHDR — 8-bit RGB, no filter / interlace
                ihdr = struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0)
                # Each row: 1 filter byte (0 = None) + size * RGB triples
                row = b"\x00" + bytes([R, G, B]) * size
                raw = row * size
                idat = zlib.compress(raw, 9)
                return (
                    b"\x89PNG\r\n\x1a\n"
                    + chunk(b"IHDR", ihdr)
                    + chunk(b"IDAT", idat)
                    + chunk(b"IEND", b"")
                )

            for size, density in DENSITIES:
                directory = f"android/app/src/main/res/mipmap-{density}"
                os.makedirs(directory, exist_ok=True)
                path = f"{directory}/ic_launcher.png"
                with open(path, "wb") as fh:
                    fh.write(make_png(size))
                print(f"wrote {path} ({size}x{size}, {os.path.getsize(path)} bytes)")

      - name: Download CEDICT dictionary
        run: |
          mkdir -p assets/dict
          if [ ! -f assets/dict/cedictJSON.json ]; then
            echo "Downloading CEDICT dictionary from rawmarshmellows/chinese-pinyin-JSON..."
            curl -fL \
              "https://raw.githubusercontent.com/rawmarshmellows/chinese-pinyin-JSON/master/cedictJSON.json" \
              -o assets/dict/cedictJSON.json
            echo "Downloaded $(du -sh assets/dict/cedictJSON.json | cut -f1) dictionary."
          else
            echo "Dictionary already present, skipping download."
          fi

      - name: Generate radical decomposition data
        shell: python
        run: |
            # Download IDS (Ideographic Description Sequences) data from cjkvi/cjkvi-ids
            # and emit a compact JSON mapping each character that has a simple left-right
            # composition (⿰) to its two components.  Characters whose components are
            # complex sub-sequences (not single CJK codepoints) are excluded so that the
            # Dart side needs no IDS parsing logic.
            import os, json, urllib.request

            os.makedirs('assets/radicals', exist_ok=True)
            out = 'assets/radicals/decomp.json'

            LR_OP = '⿰'  # ⿰ — left-right IDS composition operator

            def is_cjk(c):
                cp = ord(c)
                return (
                    0x4E00 <= cp <= 0x9FFF   # CJK Unified Ideographs
                    or 0x3400 <= cp <= 0x4DBF  # Extension A
                    or 0xF900 <= cp <= 0xFAFF  # CJK Compatibility
                    or 0x20000 <= cp <= 0x2A6DF # Extension B
                )

            result = {}
            try:
                url = 'https://raw.githubusercontent.com/cjkvi/cjkvi-ids/master/ids.txt'
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=60) as r:
                    raw = r.read().decode('utf-8')

                for line in raw.splitlines():
                    if not line or line.startswith('#') or '\t' not in line:
                        continue
                    parts = line.split('\t')
                    if len(parts) < 3:
                        continue
                    char  = parts[1]
                    ids   = parts[2]
                    # Accept only simple ⿰ L R where L and R are each a single CJK char
                    if len(ids) == 3 and ids[0] == LR_OP and is_cjk(ids[1]) and is_cjk(ids[2]):
                        result[char] = {'l': ids[1], 'r': ids[2]}

                print(f'Generated {len(result)} left-right decompositions.')
            except Exception as e:
                print(f'Warning: IDS download failed ({e}); writing empty decomp.json.')

            with open(out, 'w', encoding='utf-8') as f:
                json.dump(result, f, ensure_ascii=False, separators=(',', ':'))
            print(f'Wrote {os.path.getsize(out)} bytes → {out}')

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        # continue-on-error absorbs the known false-positive "Already watching
        # path: android" inotify exception that Flutter throws when the build
        # system registers a duplicate directory watcher.  Gradle still runs to
        # completion (as evidenced by 500 s+ runtimes in previous CI logs) and
        # produces the APK — Flutter just fails to detect it.  The next step
        # performs an explicit existence check so genuine Gradle failures still
        # fail the workflow.
        continue-on-error: true
        run: flutter build apk --release --no-pub

      - name: Verify APK was produced
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found at $APK — Gradle build genuinely failed."
            exit 1
          fi
          echo "APK confirmed ($(du -sh "$APK" | cut -f1)): $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Chinese Character OCR App — release APK built from commit ${{ github.sha }}.

            This app uses ML Kit for real-time Chinese character recognition
            and provides Hanyu Pinyin via a local CEDICT dictionary lookup.

            Download `app-release.apk` below to install on an Android device.
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
