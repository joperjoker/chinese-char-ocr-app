name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate launcher icons
        run: |
          # Generate valid solid-colour PNGs with ImageMagick (preinstalled on
          # ubuntu-latest). Avoids checking 5 binary blobs into the repo and
          # avoids the hand-crafted base64 that aapt2 rejected previously.
          set -e
          for spec in 48:mdpi 72:hdpi 96:xhdpi 144:xxhdpi 192:xxxhdpi; do
            size="${spec%%:*}"
            density="${spec##*:}"
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert -size "${size}x${size}" xc:'#B71C1C' "$dir/ic_launcher.png"
          done
          ls -la android/app/src/main/res/mipmap-*/ic_launcher.png
          file android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Download CEDICT dictionary
        run: |
          mkdir -p assets/dict
          if [ ! -f assets/dict/cedictJSON.json ]; then
            echo "Downloading CEDICT dictionary from rawmarshmellows/chinese-pinyin-JSON..."
            curl -fL \
              "https://raw.githubusercontent.com/rawmarshmellows/chinese-pinyin-JSON/master/cedictJSON.json" \
              -o assets/dict/cedictJSON.json
            echo "Downloaded $(du -sh assets/dict/cedictJSON.json | cut -f1) dictionary."
          else
            echo "Dictionary already present, skipping download."
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Chinese Character OCR App — release APK built from commit ${{ github.sha }}.

            This app uses ML Kit for real-time Chinese character recognition
            and provides Hanyu Pinyin via a local CEDICT dictionary lookup.

            Download `app-release.apk` below to install on an Android device.
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
