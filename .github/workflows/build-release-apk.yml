name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate launcher icons
        shell: python
        run: |
            # Write valid solid-colour PNGs at the five Android mipmap
            # densities. Python's stdlib is the most portable choice across
            # GitHub-hosted runner image versions (no apt install needed,
            # no ImageMagick dependency).
            import os
            import struct
            import zlib

            # Material Red 900 — solid square icon
            R, G, B = 0xB7, 0x1C, 0x1C

            DENSITIES = [
                (48, "mdpi"),
                (72, "hdpi"),
                (96, "xhdpi"),
                (144, "xxhdpi"),
                (192, "xxxhdpi"),
            ]

            def chunk(tag: bytes, data: bytes) -> bytes:
                return (
                    struct.pack(">I", len(data))
                    + tag
                    + data
                    + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
                )

            def make_png(size: int) -> bytes:
                # IHDR — 8-bit RGB, no filter / interlace
                ihdr = struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0)
                # Each row: 1 filter byte (0 = None) + size * RGB triples
                row = b"\x00" + bytes([R, G, B]) * size
                raw = row * size
                idat = zlib.compress(raw, 9)
                return (
                    b"\x89PNG\r\n\x1a\n"
                    + chunk(b"IHDR", ihdr)
                    + chunk(b"IDAT", idat)
                    + chunk(b"IEND", b"")
                )

            for size, density in DENSITIES:
                directory = f"android/app/src/main/res/mipmap-{density}"
                os.makedirs(directory, exist_ok=True)
                path = f"{directory}/ic_launcher.png"
                with open(path, "wb") as fh:
                    fh.write(make_png(size))
                print(f"wrote {path} ({size}x{size}, {os.path.getsize(path)} bytes)")

      - name: Download CEDICT dictionary
        run: |
          mkdir -p assets/dict
          if [ ! -f assets/dict/cedictJSON.json ]; then
            echo "Downloading CEDICT dictionary from rawmarshmellows/chinese-pinyin-JSON..."
            curl -fL \
              "https://raw.githubusercontent.com/rawmarshmellows/chinese-pinyin-JSON/master/cedictJSON.json" \
              -o assets/dict/cedictJSON.json
            echo "Downloaded $(du -sh assets/dict/cedictJSON.json | cut -f1) dictionary."
          else
            echo "Dictionary already present, skipping download."
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Chinese Character OCR App — release APK built from commit ${{ github.sha }}.

            This app uses ML Kit for real-time Chinese character recognition
            and provides Hanyu Pinyin via a local CEDICT dictionary lookup.

            Download `app-release.apk` below to install on an Android device.
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
