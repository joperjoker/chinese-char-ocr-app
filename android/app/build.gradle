plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.chinese_char_ocr_app"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.example.chinese_char_ocr_app"
        minSdkVersion 21
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // Debug builds can be unsigned for development
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
    
    // Enable vector drawable compatibility
    vectorDrawables {
        useSupportLibrary true
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
}

// Debug signing config - optional for development
signingConfigs {
    debug {
        // For debug builds, signing is optional
        // Uncomment below if you want to sign debug builds
        // storeFile file('debug.keystore')
        // storePassword 'android'
        // keyAlias 'androiddebugkey'
        // keyPassword 'android'
    }
    release {
        storeFile file('release.keystore')
        storePassword System.getenv('STORE_PASSWORD') ?: 'changeit'
        keyAlias System.getenv('KEY_ALIAS') ?: 'release-key'
        keyPassword System.getenv('KEY_PASSWORD') ?: 'changeit'
    }
}
