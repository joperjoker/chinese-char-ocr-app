plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.chinese_char_ocr_app"
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.example.chinese_char_ocr_app"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // ML Kit's bundled Chinese text-recognition model + native libraries.
    //
    // The google_mlkit_text_recognition plugin declares the language-specific
    // recognisers (chinese/japanese/korean/devanagari) as `compileOnly`, so
    // that Latin-only apps are not forced to ship every model.  The practical
    // consequence is that the Chinese model is NOT packaged into our APK
    // unless we add it here explicitly.  Without this line, calling
    // TextRecognizer(script: TextRecognitionScript.chinese).processImage(...)
    // reaches native code that is absent from the APK and the whole process
    // crashes at the moment recognition starts.
    //
    // 16.0.1 matches the plugin's bundled `text-recognition:16.0.1` base, so
    // there is no version skew and the native libraries share the same
    // 16KB-page alignment required by Android 15/16.  This is the bundled
    // (offline) model, so recognition continues to work with no network.
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'
}
